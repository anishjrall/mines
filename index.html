<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine Detector</title>

<style>
body {
font-family: Arial;
text-align: center;
background: #111;
color: white;
}

.grid {
display: grid;
grid-template-columns: repeat(4, 80px);
gap: 8px;
justify-content: center;
margin-top: 40px;
}

.cell {
width: 80px;
height: 80px;
background: #333;
display: flex;
align-items: center;
justify-content: center;
font-size: 24px;
cursor: pointer;
border-radius: 8px;
}

.cell.revealed {
background: #eee;
color: black;
}

button {
margin-top: 20px;
padding: 10px 20px;
cursor: pointer;
}
</style>

</head>

<body>

<h1>Mine Detector Game</h1>
<div>
Score: <span id="score">0</span> |
Moves: <span id="moves">0</span>
</div>

<div class="grid" id="grid"></div>

<button onclick="startGame()">Restart</button>

<script>

const size = 4
const mineCount = 3

let board = []
let revealed = []
let score = 0
let moves = 0
let gameOver = false

function startGame() {

board = []
revealed = []
score = 0
moves = 0
gameOver = false

document.getElementById("score").innerText = score
document.getElementById("moves").innerText = moves

for(let i=0;i<size;i++){
board[i] = []
revealed[i] = []

for(let j=0;j<size;j++){
board[i][j] = 0
revealed[i][j] = false
}
}

placeMines()
calculateNumbers()
render()
}

function placeMines(){

let placed = 0

while(placed < mineCount){

let r = Math.floor(Math.random()*size)
let c = Math.floor(Math.random()*size)

if(board[r][c] !== "M"){
board[r][c] = "M"
placed++
}

}

}

function calculateNumbers(){

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j] === "M") continue

let count = 0

for(let x=-1;x<=1;x++){
for(let y=-1;y<=1;y++){

let ni = i+x
let nj = j+y

if(
ni>=0 &&
nj>=0 &&
ni<size &&
nj<size &&
board[ni][nj] === "M"
){
count++
}

}
}

board[i][j] = count

}
}

}

function render(){

const grid = document.getElementById("grid")
grid.innerHTML = ""

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

const cell = document.createElement("div")
cell.className = "cell"

if(revealed[i][j]){
cell.classList.add("revealed")

if(board[i][j] === "M"){
cell.innerText = "💣"
cell.style.background = "#ff4d4d"
}else if(board[i][j] !== 0){
cell.innerText = board[i][j]
}

}

cell.onclick = () => reveal(i,j)

grid.appendChild(cell)

}
}

}

function reveal(i,j){

if(revealed[i][j] || gameOver) return

revealed[i][j] = true
moves++

document.getElementById("moves").innerText = moves

if(board[i][j] === "M"){
gameOver = true
showAllMines()
render()
setTimeout(()=>{
alert("Game Over 💣\nScore: " + score)
},200)
return
}

score += 10
document.getElementById("score").innerText = score

checkWin()
render()

}

function showAllMines(){

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){
if(board[i][j] === "M"){
revealed[i][j] = true
}
}
}

}

function checkWin(){

let safe = 0

for(let i=0;i<size;i++){
for(let j=0;j<size;j++){

if(board[i][j] !== "M" && revealed[i][j]){
safe++
}

}
}

if(safe === (size*size - mineCount)){
gameOver = true
setTimeout(()=>{
alert("You Win 🎉\nScore: " + score + "\nMoves: " + moves)
},200)
}

}

startGame()

</script>

</body>
</html>
